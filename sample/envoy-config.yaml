# tinyenvoy config for the tinybox sample — service discovery mode
#
# tinyenvoy discovers whoami pod endpoints automatically by polling the
# tinykube Service API. No manual port lookup needed.
#
# Prerequisites:
#   1. tinykube running on :8080
#   2. whoami deployment running (tkctl apply -f manifests/whoami.yaml)
#   3. whoami Service created  (tkctl apply -f manifests/whoami-svc.yaml)
#
# Then: go run ./cmd/envoy -config ../sample/envoy-config.yaml

listener:
  addr: ":8888"
  tls:
    enabled: false

admin:
  addr: ":9090"

clusters:
  - name: whoami
    lb_policy: round-robin
    health_check:
      path: /health
      interval: 5s
      timeout: 2s
      unhealthy_threshold: 3
      healthy_threshold: 2
    discovery:
      tinykube_addr: http://localhost:8080   # tinykube API server
      service: whoami                        # tinykube Service name
      namespace: default
      interval: 5s                           # how often to poll /endpoints

routes:
  - virtual_host: "*"
    routes:
      - prefix: /
        cluster: whoami
